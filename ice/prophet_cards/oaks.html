<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin H. Oaks</title>
    <style>
        /* Insert styles here, this is called an internal stylesheet  */
        body {
            background: #FFECD7;
        }
        h1 {
            font-family: Arial, Helvetica, sans-serif;
            color: #FFFFFE;
            margin-bottom: 0;
        }
        .card {
            display: grid;
            border: 5px black solid;
            background: #008db1;
            height: auto;
            text-align: center;
            border-radius: 30px;
            margin: 100px;
        }
        #subtitle {
            font-family: Arial, Helvetica, sans-serif;
            color: #91e4fb;
            text-align: center;
            padding: 10px;
            text-decoration: none;
        }
        .img {
            border: 5px white solid;
            margin-left: 48px;
            width: 70%;
        }
        #text {
            font-family: "brush script MT";
            color: #FFd783;
            font-size: larger;
        }
        .list {
            color: #FFFFFE;
            margin: 25px 90px;
            font-family: Arial, Helvetica, sans-serif;
            align-content: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dallin H. Oaks</h1>
        <a id="subtitle" href="https://churchofjesuschrist.org">
            <p >18th President of the Church of Jesus Christ of Latter-day Saints</p>
        </a>
        <img class="img"src="images/oaks.webp">
        <ul class="list">
            <li>Born: Aug 12, 1932</li>
            <li>Apostle: Apr 7, 1984</li>
            <li>Prophet: Oct 14, 2025</li>
        </ul>
        <p id="text">
            "The only perminent solution to the differences
            that devide us is for all of us to follow our
            Savior's and to gradually become even as He is."
        </p>
    </div>
</body>
</html>
