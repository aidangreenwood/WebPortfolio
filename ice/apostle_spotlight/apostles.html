<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background-color: #E8EcEd;
        }
        #card {
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 900px;
            margin: 100px auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        #backgroundimg {
            position: absolute;
            width: 100%;
            border: 5px black solid;
            border-radius: 25px;
            z-index: 0;
        }
        h1, h2 {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            justify-self: center;
            z-index: 1;
        }
        .president {
            width: 70px ;
            height: 70px;
            object-fit: cover;
            border: 4px #E8EcEd solid;
            border-radius: 50%;
        }
        .councler {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 4px #E8EcEd solid;
            border-radius: 50%;
        }
        .twelve {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border: 4px #E8EcEd solid;
            border-radius: 50%;
        }
        #card div{
            position: relative;
        }
        .apostles {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            justify-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <section id="card">
        <img id="backgroundimg"src="images/christus.webp">
        <div class="firstpres">
            <h1>First Presidency</h1>
            <img class="councler" src="images/eyring.webp" alt="">
            <img class="president" src="images/oaks.webp">
            <img class="councler" src="images/christofferson.webp">
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div class="apostles">
            
            <img class="twelve" src="images/uchtdorf.webp">
            <img class="twelve" src="images/bednar.webp">
            <img class="twelve" src="images/cook.webp">
            <img class="twelve" src="images/anderson.webp">
            <img class="twelve" src="images/rasband.webp">
            <img class="twelve" src="images/stevenson.webp">
            <img class="twelve" src="images/renlund.webp">
            <img class="twelve" src="images/gong.webp">
            <img class="twelve" src="images/soares.webp">
            <img class="twelve" src="images/kearon.webp">
            <img class="twelve" src="images/causse.webp">
            <img class="twelve" src="images/gilbert.webp">
        </div>
    </section>
</body>
</html>
